<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وايت ليست | 7NAX7NA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: #0f0f0f; color: #fff; line-height: 1.6; }

        /* Navbar */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 10%; 
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(39, 245, 163, 0.3);
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo { font-size: 26px; font-weight: bold; }
        .logo span { color: #27F5A3; }
        .nav-links { list-style: none; display: flex; gap: 15px; align-items: center; }
        .nav-links a { 
            text-decoration: none; color: #fff; font-weight: bold; transition: 0.3s;
            padding: 8px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-links a:hover { 
            background: rgba(39, 245, 163, 0.2);
            border-color: rgba(39, 245, 163, 0.5);
            color: #27F5A3;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #27F5A3;
        }
        .user-name {
            color: #27F5A3;
            font-size: 14px;
            font-weight: bold;
        }
        .logout-btn {
            color: #ff6b6b !important;
            font-size: 14px;
        }

        /* Whitelist Section */
        .section { padding: 150px 10% 80px; background-color: #161616; min-height: 100vh; }
        .section-title { text-align: center; margin-bottom: 60px; font-size: 2.8rem; color: #27F5A3; }
        
        .form-container { background: #1e1e1e; padding: 35px; border-radius: 20px; border: 1px solid #444; max-width: 700px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; color: #ccc; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #282828; border: 1px solid #444; border-radius: 8px; color: #fff; font-family: 'Cairo'; }
        .form-group textarea { height: 100px; resize: none; }
        .submit-btn { width: 100%; padding: 15px; background: #27F5A3; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .submit-btn:hover { background: #1ed18a; }

        footer { text-align: center; padding: 50px; background: #0a0a0a; color: #666; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem('discord_user')) {
            window.location.href = '/login';
        }
    </script>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">7NAX<span>7NA</span></div>
            <div class="user-profile">
                <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                <span id="user-info" class="user-name"></span>
            </div>
            <a href="#" onclick="logout()" class="logout-btn">تسجيل الخروج</a>
        </div>
        <ul class="nav-links">
            <li><a href="/interface">الرئيسية</a></li>
            <li><a href="/store">المتجر</a></li>
            <li><a href="/whitelist">وايت ليست</a></li>
        </ul>
    </nav>

    <script>
        const user = JSON.parse(localStorage.getItem('discord_user'));
        if (user) {
            document.getElementById('user-info').textContent = user.username;
            const avatarUrl = user.avatar 
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                : 'https://cdn.discordapp.com/embed/avatars/0.png';
            document.getElementById('user-avatar').src = avatarUrl;
        }
        function logout() {
            localStorage.removeItem('discord_user');
            window.location.href = '/login';
        }
    </script>

    <section class="section">
        <h2 class="section-title">تقديم وايت ليست</h2>
        <div class="form-container">
            <form id="whitelistForm">
                <div class="form-group">
                    <label>اسم الديسكورد:</label>
                    <input type="text" id="discordName" placeholder="Example#0000" required>
                </div>
                <div class="form-group">
                    <label>ما هو مفهومك للرول بلاي؟</label>
                    <textarea id="rpConcept" placeholder="اشرح بأسلوبك..." required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">إرسال الطلب</button>
                <div id="message" style="margin-top: 15px; text-align: center; color: #27F5A3; font-weight: bold;"></div>
            </form>
        </div>
    </section>

    <script>
        // Discord Webhook URL - استبدل هذا بالـ URL من Discord
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1357890123456/abc123def456'; // استبدل هذا!
        
        document.getElementById('whitelistForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            const discordName = document.getElementById('discordName').value;
            const rpConcept = document.getElementById('rpConcept').value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري الإرسال...';
            
            try {
                const user = JSON.parse(localStorage.getItem('discord_user')) || {};
                const avatarUrl = user.avatar 
                    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                    : 'https://cdn.discordapp.com/embed/avatars/0.png';
                
                const payload = {
                    content: '📝 **تقديم جديد على الوايت ليست!**',
                    embeds: [{
                        color: 0x27F5A3,
                        title: 'طلب وايت ليست من الموقع',
                        thumbnail: { url: avatarUrl },
                        fields: [
                            { name: '👤 اسم الديسكورد', value: discordName, inline: true },
                            { name: '🆔 معرف المستخدم', value: user.id || 'غير مسجل', inline: true },
                            { name: '📝 مفهوم الرول بلاي', value: rpConcept }
                        ],
                        timestamp: new Date().toISOString(),
                        footer: { text: 'تم الإرسال من موقع 7NAX7NA' }
                    }]
                };
                
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    messageDiv.textContent = '✅ تم إرسال طلبك بنجاح!';
                    messageDiv.style.color = '#27F5A3';
                    document.getElementById('whitelistForm').reset();
                } else {
                    messageDiv.textContent = '❌ حدث خطأ في الإرسال!';
                    messageDiv.style.color = '#ff6b6b';
                }
            } catch (error) {
                messageDiv.textContent = '❌ حدث خطأ في الاتصال!';
                messageDiv.style.color = '#ff6b6b';
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = 'إرسال الطلب';
        });
    </script>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 | سيرفر 7NAX7NA</p>
    </footer>

</body>
</html>
