<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وايت ليست | 7NAX7NA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: #0f0f0f; color: #fff; line-height: 1.6; }

        /* Navbar */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 10%; background: rgba(15, 15, 15, 0.98);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 2px solid #27F5A3;
        }
        .logo { font-size: 26px; font-weight: bold; }
        .logo span { color: #27F5A3; }
        .nav-links { list-style: none; display: flex; gap: 25px; align-items: center; }
        .nav-links a { text-decoration: none; color: #fff; font-weight: bold; transition: 0.3s; }
        .nav-links a:hover { color: #27F5A3; }
        .btn-discord { background: #5865F2; padding: 8px 20px; border-radius: 6px; color: #fff !important; }

        /* Whitelist Section */
        .section { padding: 150px 10% 80px; background-color: #161616; min-height: 100vh; }
        .section-title { text-align: center; margin-bottom: 60px; font-size: 2.8rem; color: #27F5A3; }
        
        .form-container { background: #1e1e1e; padding: 35px; border-radius: 20px; border: 1px solid #444; max-width: 700px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; color: #ccc; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #282828; border: 1px solid #444; border-radius: 8px; color: #fff; font-family: 'Cairo'; }
        .form-group textarea { height: 100px; resize: none; }
        .submit-btn { width: 100%; padding: 15px; background: #27F5A3; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .submit-btn:hover { background: #1ed18a; }

        footer { text-align: center; padding: 50px; background: #0a0a0a; color: #666; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">7NAX<span>7NA</span></div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="store.html">المتجر</a></li>
            <li><a href="whitelist.html">وايت ليست</a></li>
            <li><a href="https://discord.gg/D4dxHpHT5P" target="_blank" class="btn-discord">الديسكورد</a></li>
        </ul>
    </nav>

    <section class="section">
        <h2 class="section-title">تقديم وايت ليست</h2>
        <div class="form-container">
            <form onsubmit="event.preventDefault(); alert('سيتم تحويلك للديسكورد للتقديم'); window.open('https://discord.gg/D4dxHpHT5P');">
                <div class="form-group">
                    <label>اسم الديسكورد:</label>
                    <input type="text" placeholder="Example#0000" required>
                </div>
                <div class="form-group">
                    <label>ما هو مفهومك للرول بلاي؟</label>
                    <textarea placeholder="اشرح بأسلوبك..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">إرسال عبر الديسكورد</button>
            </form>
        </div>
    </section>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 | سيرفر 7NAX7NA</p>
    </footer>

</body>
</html>
