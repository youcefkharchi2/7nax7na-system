<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وايت ليست | 7NAX7NA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: #0f0f0f; color: #fff; line-height: 1.6; }

        /* Navbar */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 10%; 
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(39, 245, 163, 0.3);
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo { font-size: 26px; font-weight: bold; }
        .logo span { color: #27F5A3; }
        .nav-links { list-style: none; display: flex; gap: 15px; align-items: center; }
        .nav-links a { 
            text-decoration: none; color: #fff; font-weight: bold; transition: 0.3s;
            padding: 8px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-links a:hover { 
            background: rgba(39, 245, 163, 0.2);
            border-color: rgba(39, 245, 163, 0.5);
            color: #27F5A3;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #27F5A3;
        }
        .user-name {
            color: #27F5A3;
            font-size: 14px;
            font-weight: bold;
        }
        .logout-btn {
            color: #ff6b6b !important;
            border: 1px solid #ff6b6b;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: #ff6b6b;
            color: #fff !important;
        }
        .back-btn {
            background: #27F5A3;
            color: #000;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background: #1ed18a; }
        .back-btn::before { content: '←'; font-size: 16px; }

        /* Whitelist Section */
        .section { padding: 150px 10% 80px; background-color: #161616; min-height: 100vh; }
        .section-title { text-align: center; margin-bottom: 60px; font-size: 2.8rem; color: #27F5A3; }
        
        .form-container { background: #1e1e1e; padding: 35px; border-radius: 20px; border: 1px solid #444; max-width: 700px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; color: #ccc; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #282828; border: 1px solid #444; border-radius: 8px; color: #fff; font-family: 'Cairo'; }
        .form-group textarea { height: 100px; resize: none; }
        .submit-btn { width: 100%; padding: 15px; background: #27F5A3; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .submit-btn:hover { background: #1ed18a; }

        footer { text-align: center; padding: 50px; background: #0a0a0a; color: #666; border-top: 1px solid #333; }

        /* Floating back button */
        .float-back {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #27F5A3;
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(39, 245, 163, 0.4);
            transition: 0.3s;
            z-index: 1000;
        }
        .float-back:hover {
            background: #1ed18a;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(39, 245, 163, 0.6);
        }
        /* Floating nav buttons - no border/frame, just text with underline */
        .float-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 1000;
        }
        .float-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            position: relative;
            padding: 5px 0;
            transition: 0.3s;
        }
        .float-nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #27F5A3;
            transition: width 0.3s;
        }
        .float-nav a:hover { color: #27F5A3; }
        .float-nav a:hover::after { width: 100%; }
        .float-nav a.active { color: #27F5A3; }
        .float-nav a.active::after { width: 100%; }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem('discord_user')) {
            window.location.href = '/login';
        }
    </script>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">7NAX<span>7NA</span></div>
            <div class="user-profile">
                <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                <span id="user-info" class="user-name"></span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="/interface" class="back-btn">الرئيسية</a></li>
            <li><a href="/store">المتجر</a></li>
            <li><a href="/whitelist">وايت ليست</a></li>
            <li><a href="#" onclick="logout()" class="logout-btn">تسجيل الخروج</a></li>
        </ul>
    </nav>

    <div class="float-nav">
        <a href="/interface">الرئيسية</a>
        <a href="/whitelist" class="active">وايت ليست</a>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('discord_user'));
        if (user) {
            document.getElementById('user-info').textContent = user.username;
            const avatarUrl = user.avatar 
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                : 'https://cdn.discordapp.com/embed/avatars/0.png';
            document.getElementById('user-avatar').src = avatarUrl;
        }
        function logout() {
            localStorage.removeItem('discord_user');
            window.location.href = '/login';
        }
    </script>

    <section class="section">
        <h2 class="section-title" id="pageTitle">تقديم وايت ليست</h2>
        <div class="form-container" id="formContainer">
            <form id="whitelistForm">
                <div class="form-group">
                    <label>RP Name:</label>
                    <input type="text" id="rpName" placeholder="اسم شخصيتك في الرول بلاي" required>
                </div>
                <div class="form-group">
                    <label>RP Age:</label>
                    <input type="number" id="rpAge" placeholder="عمر شخصيتك" required>
                </div>
                <div class="form-group">
                    <label>Real Name:</label>
                    <input type="text" id="realName" placeholder="اسمك الحقيقي" required>
                </div>
                <div class="form-group">
                    <label>Real Age:</label>
                    <input type="number" id="realAge" placeholder="عمرك الحقيقي" required>
                </div>
                <div class="form-group">
                    <label>COUNTRY:</label>
                    <input type="text" id="country" placeholder="بلدك" required>
                </div>
                <div class="form-group">
                    <label>Steam Link:</label>
                    <input type="url" id="steamLink" placeholder="رابط حساب Steam" required>
                </div>
                <div class="form-group">
                    <label>Your Story:</label>
                    <textarea id="story" placeholder="قصة شخصيتك..." required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">إرسال الطلب</button>
                <div id="message" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
            </form>
        </div>
        <div id="statusContainer" style="display: none; text-align: center; padding: 40px; background: rgba(0,0,0,0.7); border-radius: 10px; margin: 20px;">
            <div id="statusIcon" style="font-size: 60px; margin-bottom: 20px;"></div>
            <h3 id="statusTitle" style="color: #27F5A3; margin-bottom: 15px;"></h3>
            <p id="statusMessage" style="color: white; font-size: 16px;"></p>
            <p id="statusReason" style="color: #ff6b6b; font-size: 14px; margin-top: 10px; display: none;"></p>
        </div>
    </section>

    <script>
        const userData = JSON.parse(localStorage.getItem('discord_user')) || {};
        const userId = userData.id;
        
        // Check whitelist status on page load
        async function checkWhitelistStatus() {
            if (!userId) {
                document.getElementById('message').textContent = '⚠️ يرجى تسجيل الدخول أولاً!';
                document.getElementById('message').style.color = '#ff6b6b';
                return;
            }
            
            try {
                const response = await fetch(`/api/whitelist/status/${userId}`);
                const data = await response.json();
                
                const formContainer = document.getElementById('formContainer');
                const statusContainer = document.getElementById('statusContainer');
                const pageTitle = document.getElementById('pageTitle');
                
                if (data.status === 'approved') {
                    formContainer.style.display = 'none';
                    statusContainer.style.display = 'block';
                    pageTitle.textContent = 'حالة الوايت ليست';
                    document.getElementById('statusIcon').textContent = '✅';
                    document.getElementById('statusTitle').textContent = 'تم قبولك في الوايت ليست!';
                    document.getElementById('statusTitle').style.color = '#27F5A3';
                    document.getElementById('statusMessage').textContent = 'تهانينا! تم قبول طلبك في الوايت ليست. يمكنك الآن الانضمام للسيرفر.';
                } else if (data.status === 'blocked') {
                    formContainer.style.display = 'none';
                    statusContainer.style.display = 'block';
                    pageTitle.textContent = 'حالة الوايت ليست';
                    document.getElementById('statusIcon').textContent = '🚫';
                    document.getElementById('statusTitle').textContent = 'تم حظرك من الوايت ليست';
                    document.getElementById('statusTitle').style.color = '#ff6b6b';
                    document.getElementById('statusMessage').textContent = 'عذراً، تم رفض طلبك وتم حظرك من التقديم مرة أخرى.';
                    if (data.reason) {
                        document.getElementById('statusReason').textContent = `السبب: ${data.reason}`;
                        document.getElementById('statusReason').style.display = 'block';
                    }
                } else if (data.status === 'pending') {
                    document.getElementById('message').textContent = '⏳ طلبك قيد المراجعة...';
                    document.getElementById('message').style.color = '#f5a623';
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('submitBtn').textContent = 'طلبك قيد المراجعة';
                } else if (data.status === 'rejected') {
                    document.getElementById('message').textContent = '❌ تم رفض طلبك السابق. يمكنك التقديم مرة أخرى.';
                    document.getElementById('message').style.color = '#ff6b6b';
                }
            } catch (error) {
                console.error('Error checking status:', error);
            }
        }
        
        checkWhitelistStatus();
        
        document.getElementById('whitelistForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            const rpName = document.getElementById('rpName').value;
            const rpAge = document.getElementById('rpAge').value;
            const realName = document.getElementById('realName').value;
            const realAge = document.getElementById('realAge').value;
            const country = document.getElementById('country').value;
            const steamLink = document.getElementById('steamLink').value;
            const story = document.getElementById('story').value;
            
            if (!userId) {
                messageDiv.textContent = '❌ يرجى تسجيل الدخول أولاً!';
                messageDiv.style.color = '#ff6b6b';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري الإرسال...';
            
            try {
                const response = await fetch('/api/whitelist/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        rp_name: rpName,
                        rp_age: rpAge,
                        real_name: realName,
                        real_age: realAge,
                        country: country,
                        steam_link: steamLink,
                        story: story,
                        user_id: userId,
                        user_avatar: userData.avatar ? `https://cdn.discordapp.com/avatars/${userData.id}/${userData.avatar}.png` : null
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.textContent = '✅ ' + data.message;
                    messageDiv.style.color = '#27F5A3';
                    document.getElementById('whitelistForm').reset();
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'طلبك قيد المراجعة';
                    
                    // Send to Bot HTTP server for Discord message with buttons
                    try {
                        const botResponse = await fetch('http://51.75.118.17:20205/send-whitelist', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                rp_name: rpName,
                                rp_age: rpAge,
                                real_name: realName,
                                real_age: realAge,
                                country: country,
                                steam_link: steamLink,
                                story: story,
                                user_id: userId,
                                user_avatar: userData.avatar ? `https://cdn.discordapp.com/avatars/${userData.id}/${userData.avatar}.png` : null,
                                app_id: data.id
                            })
                        });
                        
                        if (botResponse.ok) {
                            console.log('✅ Sent to bot with buttons');
                        } else {
                            console.log('⚠️ Bot failed, using webhook fallback');
                            // Fallback to webhook
                            const webhookPayload = {
                                content: '📩 **تقديم جديد على الوايت ليست!**',
                                embeds: [{
                                    color: 0x27F5A3,
                                    title: '📝 طلب وايت ليست من الموقع',
                                    thumbnail: { url: userData.avatar ? `https://cdn.discordapp.com/avatars/${userData.id}/${userData.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png' },
                                    fields: [
                                        { name: '👤 RP Name', value: rpName, inline: true },
                                        { name: '� RP Age', value: rpAge, inline: true },
                                        { name: '📝 Real Name', value: realName, inline: true },
                                        { name: '🎂 Real Age', value: realAge, inline: true },
                                        { name: '🌍 Country', value: country, inline: true },
                                        { name: '🔗 Steam', value: steamLink, inline: true },
                                        { name: '📖 Story', value: story }
                                    ],
                                    timestamp: new Date().toISOString()
                                }]
                            };
                            
                            await fetch('https://discord.com/api/webhooks/1490436786151882963/aUvC7MkMGhClMvx4jB7hq3kOkYUs8EI1hP2gd033whkTX2ChHtNMRyxtgYLgYS4VCysu', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(webhookPayload)
                            });
                        }
                    } catch (botErr) {
                        console.log('Bot connection failed:', botErr);
                    }
                } else {
                    messageDiv.textContent = '❌ ' + (data.error || 'حدث خطأ!');
                    messageDiv.style.color = '#ff6b6b';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'إرسال الطلب';
                }
            } catch (error) {
                messageDiv.textContent = '❌ حدث خطأ في الاتصال بالسيرفر!';
                messageDiv.style.color = '#ff6b6b';
                submitBtn.disabled = false;
                submitBtn.textContent = 'إرسال الطلب';
            }
        });
    </script>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 | سيرفر 7NAX7NA</p>
    </footer>

</body>
</html>
