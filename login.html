<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | 7NAX7NA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), url('https://d.top4top.io/p_37256nv091.jpg') center/cover no-repeat fixed;
            color: #fff; 
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 10%; 
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(39, 245, 163, 0.3);
        }
        .logo { font-size: 26px; font-weight: bold; }
        .logo span { color: #27F5A3; }
        .nav-links { list-style: none; display: flex; gap: 15px; align-items: center; }
        .nav-links a { 
            text-decoration: none; color: #fff; font-weight: bold; transition: 0.3s;
            padding: 8px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-links a:hover { 
            background: rgba(39, 245, 163, 0.2);
            border-color: rgba(39, 245, 163, 0.5);
            color: #27F5A3;
        }

        /* Login Section */
        .login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 10% 50px;
        }
        .login-box {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .login-box .logo-text {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .login-box .logo-text span { color: #27F5A3; }
        .subtitle {
            color: #888;
            margin-bottom: 35px;
            font-size: 1rem;
        }
        .discord-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 30px;
            background: #5865F2;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
        }
        .discord-btn:hover {
            background: #4752c4;
            transform: translateY(-2px);
        }
        .discord-btn svg {
            width: 24px;
            height: 24px;
        }
        .divider {
            margin: 25px 0;
            border-top: 1px solid #333;
        }
        .info {
            color: #666;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #0a0a0a;
            color: #666;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">7NAX<span>7NA</span></div>
        <ul class="nav-links">
            <li><a href="/interface">الرئيسية</a></li>
            <li><a href="/store">المتجر</a></li>
            <li><a href="/whitelist">وايت ليست</a></li>
        </ul>
    </nav>

    <section class="login-section">
        <div class="login-box">
            <div class="logo-text">7NAX<span>7NA</span></div>
            <p class="subtitle">سيرفر الرول بلاي الأول في المنطقة</p>

            <button class="discord-btn" onclick="loginWithDiscord()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.249a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.249.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-14.021a.061.061 0 0 0-.031-.03z"/>
                </svg>
                تسجيل الدخول بالديسكورد
            </button>

            <div class="divider"></div>
            <p class="info">يجب تسجيل الدخول للوصول للموقع</p>
        </div>
    </section>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 | سيرفر 7NAX7NA</p>
    </footer>

    <script>
        // Discord OAuth Configuration
        const CLIENT_ID = '1486022873821876224'; // بدل هذا بـ Client ID ديالك
        const REDIRECT_URI = window.location.origin + '/auth.html';
        const SCOPE = 'identify';

        function loginWithDiscord() {
            const discordAuthUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${SCOPE}`;
            window.location.href = discordAuthUrl;
        }

        // Check if already logged in
        if (localStorage.getItem('discord_user')) {
            window.location.href = '/interface';
        }
    </script>

</body>
</html>
