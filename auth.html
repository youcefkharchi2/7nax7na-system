<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تسجيل الدخول... | 7NAX7NA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .loading-container {
            text-align: center;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top-color: #27F5A3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            font-size: 1.2rem;
            color: #888;
        }
        .error {
            color: #ff6b6b;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="loading-container">
        <div class="spinner"></div>
        <p class="message">جاري تسجيل الدخول...</p>
        <p id="error" class="error"></p>
    </div>

    <script>
        // Handle Discord OAuth callback
        async function handleAuth() {
            // Get access token from URL hash
            const hash = window.location.hash;
            const params = new URLSearchParams(hash.substring(1));
            const accessToken = params.get('access_token');
            const error = params.get('error');

            if (error) {
                document.getElementById('error').textContent = 'فشل تسجيل الدخول: ' + error;
                setTimeout(() => window.location.href = 'login.html', 3000);
                return;
            }

            if (!accessToken) {
                document.getElementById('error').textContent = 'لم يتم العثور على token';
                setTimeout(() => window.location.href = 'login.html', 3000);
                return;
            }

            try {
                // Fetch user info from Discord
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch user');

                const user = await response.json();
                
                // Save user info
                localStorage.setItem('discord_user', JSON.stringify({
                    id: user.id,
                    username: user.username,
                    avatar: user.avatar,
                    accessToken: accessToken
                }));

                // Redirect to main page
                window.location.href = '/interface';

            } catch (err) {
                document.getElementById('error').textContent = 'حدث خطأ: ' + err.message;
                setTimeout(() => window.location.href = 'login.html', 3000);
            }
        }

        handleAuth();
    </script>

</body>
</html>
