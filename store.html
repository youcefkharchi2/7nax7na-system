<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | 7NAX7NA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="section" style="padding-top: 50px;">
        <h2 class="section-title">مقتنيات السيرفر</h2>
        <div class="grid-container">
            <div class="card">
                <img src="https://b.top4top.io/p_372585a8a1.png" alt="BMW M3" onclick="viewImage(this.src)">
                <div class="card-body">
                    <h3>BMW M3</h3>
                    <p>أداء جبار وشكل انسيابي</p>
                    <span class="price">$20.00</span>
                    <button class="buy-btn" onclick="window.open('https://discord.gg/D4dxHpHT5P')">شراء الآن</button>
                </div>
            </div>
            <div class="card">
                <img src="https://g.top4top.io/p_3725vjpx01.jpg" alt="Kawasaki" onclick="viewImage(this.src)">
                <div class="card-body">
                    <h3>2020 Kawasaki Z</h3>
                    <p>دباب كواساكي مميز للمغامرات</p>
                    <span class="price">$15.00</span>
                    <button class="buy-btn" onclick="window.open('https://discord.gg/D4dxHpHT5P')">شراء الآن</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 | سيرفر 7NAX7NA</p>
    </footer>

    <script>
        function viewImage(src) {
            document.getElementById("fullImage").src = src;
            document.getElementById("imageViewer").style.display = "flex";
        }
    </script>

</body>
</html>
