<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | 7NAX7NA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: #0f0f0f; color: #fff; line-height: 1.6; }

        /* Navbar */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 10%; 
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(39, 245, 163, 0.3);
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo { font-size: 26px; font-weight: bold; }
        .logo span { color: #27F5A3; }
        .nav-links { list-style: none; display: flex; gap: 15px; align-items: center; }
        .nav-links a { 
            text-decoration: none; color: #fff; font-weight: bold; transition: 0.3s;
            padding: 8px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-links a:hover { 
            background: rgba(39, 245, 163, 0.2);
            border-color: rgba(39, 245, 163, 0.5);
            color: #27F5A3;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #27F5A3;
        }
        .user-name {
            color: #27F5A3;
            font-size: 14px;
            font-weight: bold;
        }
        .logout-btn {
            color: #ff6b6b !important;
            font-size: 14px;
        }

        /* Store Section */
        .section { padding: 120px 10% 80px; }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem('discord_user')) {
            window.location.href = 'login.html';
        }
    </script>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">7NAX<span>7NA</span></div>
            <div class="user-profile">
                <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                <span id="user-info" class="user-name"></span>
            </div>
            <a href="#" onclick="logout()" class="logout-btn">تسجيل الخروج</a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="store.html">المتجر</a></li>
            <li><a href="whitelist.html">وايت ليست</a></li>
        </ul>
    </nav>

    <script>
        const user = JSON.parse(localStorage.getItem('discord_user'));
        if (user) {
            document.getElementById('user-info').textContent = user.username;
            const avatarUrl = user.avatar 
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                : 'https://cdn.discordapp.com/embed/avatars/0.png';
            document.getElementById('user-avatar').src = avatarUrl;
        }
        function logout() {
            localStorage.removeItem('discord_user');
            window.location.href = 'login.html';
        }
    </script>

    <section class="section" style="padding-top: 100px;">
        <h2 class="section-title">مقتنيات السيرفر</h2>
        <div class="grid-container">
            <div class="card">
                <img src="https://b.top4top.io/p_372585a8a1.png" alt="BMW M3" onclick="viewImage(this.src)">
                <div class="card-body">
                    <h3>BMW M3</h3>
                    <p>أداء جبار وشكل انسيابي</p>
                    <span class="price">$20.00</span>
                    <button class="buy-btn" onclick="window.open('https://discord.gg/D4dxHpHT5P')">شراء الآن</button>
                </div>
            </div>
            <div class="card">
                <img src="https://g.top4top.io/p_3725vjpx01.jpg" alt="Kawasaki" onclick="viewImage(this.src)">
                <div class="card-body">
                    <h3>2020 Kawasaki Z</h3>
                    <p>دباب كواساكي مميز للمغامرات</p>
                    <span class="price">$15.00</span>
                    <button class="buy-btn" onclick="window.open('https://discord.gg/D4dxHpHT5P')">شراء الآن</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function logout() {
            localStorage.removeItem('discord_user');
            window.location.href = 'login.html';
        }
    </script>

</body>
</html>
