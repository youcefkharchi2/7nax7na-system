<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | 7NAX7NA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: #0f0f0f; color: #fff; line-height: 1.6; }

        /* Navbar */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 10%; 
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(39, 245, 163, 0.3);
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo { font-size: 26px; font-weight: bold; }
        .logo span { color: #27F5A3; }
        .nav-links { list-style: none; display: flex; gap: 15px; align-items: center; }
        .nav-links a { 
            text-decoration: none; color: #fff; font-weight: bold; transition: 0.3s;
            padding: 8px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-links a:hover { 
            background: rgba(39, 245, 163, 0.2);
            border-color: rgba(39, 245, 163, 0.5);
            color: #27F5A3;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #27F5A3;
        }
        .user-name {
            color: #27F5A3;
            font-size: 14px;
            font-weight: bold;
        }
        /* Login/Logout buttons in nav */
        .login-btn {
            color: #27F5A3 !important;
            border: 1px solid #27F5A3;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            transition: 0.3s;
        }
        .login-btn:hover {
            background: #27F5A3;
            color: #000 !important;
        }
        .logout-btn {
            color: #ff6b6b !important;
            border: 1px solid #ff6b6b;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: #ff6b6b;
            color: #fff !important;
        }

        /* Store Section */
        .section { padding: 120px 10% 80px; }
        .section-title { text-align: center; margin-bottom: 60px; font-size: 2.8rem; color: #27F5A3; }
        
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto;
        }
        .card { 
            background: #1e1e1e; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #333;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(39, 245, 163, 0.1);
            border-color: #27F5A3;
        }
        .card img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
        .card-body { padding: 25px; }
        .card-body h3 { font-size: 1.5rem; margin-bottom: 10px; color: #27F5A3; }
        .card-body p { color: #aaa; margin-bottom: 15px; }
        .price { 
            display: block; 
            font-size: 1.8rem; 
            color: #27F5A3; 
            font-weight: bold; 
            margin-bottom: 15px;
        }
        .buy-btn { 
            width: 100%; 
            padding: 12px; 
            background: #c77100; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }
        .buy-btn:hover { background: #27F5A3; color: #000; }

        /* Floating nav buttons - no border/frame, just text with underline */
        .float-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 1000;
        }
        .float-nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            position: relative;
            padding: 5px 0;
            transition: 0.3s;
        }
        .float-nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #27F5A3;
            transition: width 0.3s;
        }
        .float-nav a:hover { color: #27F5A3; }
        .float-nav a:hover::after { width: 100%; }
        .float-nav a.active { color: #27F5A3; }
        .float-nav a.active::after { width: 100%; }

        /* Image Viewer */
        .image-viewer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .image-viewer img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .close-viewer {
            position: absolute;
            top: 20px; right: 40px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <script>
        // Check if user is logged in - if not, show login button
        const isLoggedIn = localStorage.getItem('discord_user');
    </script>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">7NAX<span>7NA</span></div>
            <div class="user-profile" id="user-section" style="display: none;">
                <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                <span id="user-info" class="user-name"></span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="/interface">الرئيسية</a></li>
            <li><a href="/store">المتجر</a></li>
            <li><a href="/whitelist">وايت ليست</a></li>
            <li id="login-btn"><a href="/login" class="login-btn">تسجيل الدخول</a></li>
            <li id="logout-btn" style="display: none;"><a href="#" onclick="logout()" class="logout-btn">تسجيل الخروج</a></li>
        </ul>
    </nav>

    <div class="float-nav">
        <a href="/interface">الرئيسية</a>
        <a href="/store" class="active">المتجر</a>
    </div>

    <script>
        // Show/hide login or logout based on auth state
        if (isLoggedIn) {
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'block';
            document.getElementById('user-section').style.display = 'flex';
            const user = JSON.parse(localStorage.getItem('discord_user'));
            if (user) {
                document.getElementById('user-info').textContent = user.username;
                const avatarUrl = user.avatar 
                    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                    : 'https://cdn.discordapp.com/embed/avatars/0.png';
                document.getElementById('user-avatar').src = avatarUrl;
            }
        }
        
        function logout() {
            localStorage.removeItem('discord_user');
            window.location.href = '/login';
        }
    </script>

    <section class="section" style="padding-top: 100px;">
        <h2 class="section-title">مقتنيات السيرفر</h2>
        <div class="grid-container">
            <div class="card">
                <img src="https://b.top4top.io/p_372585a8a1.png" alt="BMW M3" onclick="viewImage(this.src)">
                <div class="card-body">
                    <h3>BMW M3</h3>
                    <p>أداء جبار وشكل انسيابي</p>
                    <span class="price">$20.00</span>
                    <button class="buy-btn" onclick="window.open('https://discord.gg/D4dxHpHT5P')">شراء الآن</button>
                </div>
            </div>
            <div class="card">
                <img src="https://g.top4top.io/p_3725vjpx01.jpg" alt="Kawasaki" onclick="viewImage(this.src)">
                <div class="card-body">
                    <h3>2020 Kawasaki Z</h3>
                    <p>دباب كواساكي مميز للمغامرات</p>
                    <span class="price">$15.00</span>
                    <button class="buy-btn" onclick="window.open('https://discord.gg/D4dxHpHT5P')">شراء الآن</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Image Viewer -->
    <div id="imageViewer" class="image-viewer" onclick="this.style.display='none'">
        <span class="close-viewer">&times;</span>
        <img id="fullImage" src="" alt="Full View">
    </div>

    <script>
        function viewImage(src) {
            document.getElementById("fullImage").src = src;
            document.getElementById("imageViewer").style.display = "flex";
        }
    </script>

</body>
</html>
